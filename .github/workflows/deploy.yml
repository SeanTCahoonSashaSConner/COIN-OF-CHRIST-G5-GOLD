name: Deploy Frontend
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on:
      ubuntu-latest
    steps:
      - name: Checkout
        uses:
          actions/checkout@v4
      - name: Node Setup
        uses:
          actions/setup-node@v4
        with:
          node-version:
            20
          cache:
            npm
      
      - name: Install
        working-directory: frontend
        run:
          npm install
      - name: Build
        working-directory: frontend
        run:
          npm run build
      - name: Deploy
        uses:
          JamesIves/github-pages-deploy-action@v4
        with:
          folder:
            frontend/build
          branch:
            gh-pages
